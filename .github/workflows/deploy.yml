name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sostituisce i placeholder in config.js con i valori dei GitHub Secrets.
      # I secrets si configurano in: Settings → Secrets and variables → Actions
      - name: Inject secrets into config
        env:
          WIKI_PASSWORD:        ${{ secrets.WIKI_PASSWORD }}
          EMAILJS_PUBLIC_KEY:   ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_SERVICE_ID:   ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID:  ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_RECIPIENT:    ${{ secrets.EMAILJS_RECIPIENT }}
        run: |
          sed -i "s|__WIKI_PASSWORD__|${WIKI_PASSWORD}|g"       js/config.js
          sed -i "s|__EMAILJS_PUBLIC_KEY__|${EMAILJS_PUBLIC_KEY}|g"   js/config.js
          sed -i "s|__EMAILJS_SERVICE_ID__|${EMAILJS_SERVICE_ID}|g"   js/config.js
          sed -i "s|__EMAILJS_TEMPLATE_ID__|${EMAILJS_TEMPLATE_ID}|g" js/config.js
          sed -i "s|__EMAILJS_RECIPIENT__|${EMAILJS_RECIPIENT}|g"     js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
